<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miners Online Shop</title>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}
header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}
.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}
.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}
.price{
font-size:22px;
color:#e53935;
font-weight:bold;
margin:10px 0;
}
button{
background:#1877f2;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#145fd1;
}
footer{
text-align:center;
padding:20px;
color:#777;
}
</style>
</head>
<body>

<header>⛏️ Miners Online Shop</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="">
<h2>Mining Gloves</h2>
<p>Хүчтэй хамгаалалтын бээлий</p>
<div class="price">49,000₮</div>
<button onclick="order('Mining Gloves')">Messenger-р Захиалах</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=600" alt="">
<h2>Safety Boots</h2>
<p>Уул уурхайн хамгаалалтын гутал</p>
<div class="price">129,000₮</div>
<button onclick="order('Safety Boots')">Messenger-р Захиалах</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?w=600" alt="">
<h2>Miner Helmet</h2>
<p>LED гэрэлтэй каск</p>
<div class="price">89,000₮</div>
<button onclick="order('Miner Helmet')">Messenger-р Захиалах</button>
</div>

</div>

<footer>
© 2026 Miners Online Shop
</footer>

<script>
function order(product){
window.open("https://m.me/yourfacebookpage?text=Сайн байна уу, " + product + " захиалмаар байна.");
}
</script>

</body>
</html>
